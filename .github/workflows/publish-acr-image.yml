name: Build And Push Image To ACR

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-acr-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Preview' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          # Minimize permissions, do not provide GitHub token, only pull projects.
          persist-credentials: false

      - name: Validate required GitHub variables
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_CN_SITE_URL: ${{ vars.NEXT_PUBLIC_CN_SITE_URL }}
          NEXT_PUBLIC_GLOBAL_SITE_URL: ${{ vars.NEXT_PUBLIC_GLOBAL_SITE_URL }}
          NEXT_PUBLIC_DEPLOY_REGION: ${{ vars.NEXT_PUBLIC_DEPLOY_REGION }}
          NEXT_PUBLIC_OSS_BASE_URL: ${{ vars.NEXT_PUBLIC_OSS_BASE_URL }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          YUNXIAO_CD_WEBHOOK: ${{ secrets.YUNXIAO_CD_WEBHOOK || vars.YUNXIAO_CD_WEBHOOK }}
        run: |
          set -euo pipefail
          : "${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER is required}"
          : "${ACR_NAMESPACE:?ACR_NAMESPACE is required}"
          : "${ACR_REPOSITORY:?ACR_REPOSITORY is required}"
          : "${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required}"
          : "${NEXT_PUBLIC_CN_SITE_URL:?NEXT_PUBLIC_CN_SITE_URL is required}"
          : "${NEXT_PUBLIC_GLOBAL_SITE_URL:?NEXT_PUBLIC_GLOBAL_SITE_URL is required}"
          : "${NEXT_PUBLIC_DEPLOY_REGION:?NEXT_PUBLIC_DEPLOY_REGION is required}"
          : "${NEXT_PUBLIC_OSS_BASE_URL:?NEXT_PUBLIC_OSS_BASE_URL is required}"
          : "${ACR_USERNAME:?ACR_USERNAME is required (GitHub Secret)}"
          : "${ACR_PASSWORD:?ACR_PASSWORD is required (GitHub Secret)}"
          : "${YUNXIAO_CD_WEBHOOK:?YUNXIAO_CD_WEBHOOK is required in GitHub environment (Production/Preview)}"

      - name: Resolve target image repository
        id: image-target
        env:
          ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          suffix=""

          if [ "${REF_NAME}" = "dev" ]; then
            suffix="-dev"
          fi

          printf 'repository=%s%s\n' "${ACR_REPOSITORY}" "${suffix}" >> "${GITHUB_OUTPUT}"
          printf 'branch=%s\n' "${REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          logout: true

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_NAMESPACE }}/${{ steps.image-target.outputs.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=acr-image
          cache-to: type=gha,mode=max,scope=acr-image
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_CN_SITE_URL=${{ vars.NEXT_PUBLIC_CN_SITE_URL }}
            NEXT_PUBLIC_GLOBAL_SITE_URL=${{ vars.NEXT_PUBLIC_GLOBAL_SITE_URL }}
            NEXT_PUBLIC_DEPLOY_REGION=${{ vars.NEXT_PUBLIC_DEPLOY_REGION }}
            NEXT_PUBLIC_OSS_BASE_URL=${{ vars.NEXT_PUBLIC_OSS_BASE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}

      - name: Trigger Yunxiao CD pipeline
        env:
          YUNXIAO_CD_WEBHOOK: ${{ secrets.YUNXIAO_CD_WEBHOOK || vars.YUNXIAO_CD_WEBHOOK }}
        run: |
          set -euo pipefail

          : "${YUNXIAO_CD_WEBHOOK:?YUNXIAO_CD_WEBHOOK is empty}"

          curl --fail --show-error --silent \
            --header "Content-Type: application/json" \
            --request POST \
            --data "{}" \
            "${YUNXIAO_CD_WEBHOOK}"
